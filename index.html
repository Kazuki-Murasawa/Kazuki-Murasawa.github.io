<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App with Timestamp</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 95%;
            max-width: 500px;
        }
        h2 { text-align: center; color: #333; margin-top: 0; }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 1.5rem;
        }
        .inputs-row {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 2;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        input[type="date"] {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
        }
        button#add-btn {
            padding: 12px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        ul { list-style: none; padding: 0; }
        li {
            background: #fff;
            border-bottom: 1px solid #eee;
            padding: 12px 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .task-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            cursor: pointer;
        }
        .task-text { font-size: 1.1rem; color: #333; font-weight: 500; }
        
        /* 日付ラベルのスタイル */
        .date-labels {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .date-badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .due-badge { background: #fff3cd; color: #856404; } /* 期限用（黄色系） */
        .created-badge { background: #e2e3e5; color: #41464b; } /* 作成日用（グレー系） */

        .completed .task-text { text-decoration: line-through; color: #bbb; }
        .completed .date-badge { opacity: 0.5; }

        .delete-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>My ToDo List</h2>
    <div class="input-group">
        <input type="text" id="todo-input" placeholder="タスクを入力...">
        <div class="inputs-row">
            <input type="date" id="todo-date">
            <button id="add-btn">追加</button>
        </div>
    </div>
    <ul id="todo-list"></ul>
</div>

<script>
    const input = document.getElementById('todo-input');
    const dateInput = document.getElementById('todo-date');
    const addBtn = document.getElementById('add-btn');
    const todoList = document.getElementById('todo-list');

    document.addEventListener('DOMContentLoaded', loadTasks);

    function addTask() {
        const taskValue = input.value.trim();
        const dueValue = dateInput.value;
        
        if (taskValue === "") return;

        // 現在の日時を取得してフォーマットする
        const now = new Date();
        const createdValue = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;

        createTaskElement(taskValue, dueValue, createdValue, false);
        saveTasks();
        
        input.value = "";
        dateInput.value = "";
    }

    function createTaskElement(text, dueDate, createdAt, isCompleted) {
        const li = document.createElement('li');
        if (isCompleted) li.classList.add('completed');

        const dueDisplay = dueDate ? `期限: ${dueDate}` : "期限なし";
        const createdDisplay = `作成: ${createdAt}`;

        li.innerHTML = `
            <div class="task-info">
                <span class="task-text">${text}</span>
                <div class="date-labels">
                    <span class="date-badge due-badge">${dueDisplay}</span>
                    <span class="date-badge created-badge">${createdDisplay}</span>
                </div>
            </div>
            <button class="delete-btn">削除</button>
        `;

        li.querySelector('.task-info').addEventListener('click', () => {
            li.classList.toggle('completed');
            saveTasks();
        });

        li.querySelector('.delete-btn').addEventListener('click', () => {
            li.remove();
            saveTasks();
        });

        todoList.appendChild(li);
    }

    function saveTasks() {
        const tasks = [];
        document.querySelectorAll('li').forEach(li => {
            tasks.push({
                text: li.querySelector('.task-text').innerText,
                dueDate: li.querySelector('.due-badge').innerText.replace('期限: ', '').replace('期限なし', ''),
                createdAt: li.querySelector('.created-badge').innerText.replace('作成: ', ''),
                completed: li.classList.contains('completed')
            });
        });
        localStorage.setItem('myTimestampTodoList', JSON.stringify(tasks));
    }

    function loadTasks() {
        const savedTasks = JSON.parse(localStorage.getItem('myTimestampTodoList'));
        if (savedTasks) {
            savedTasks.forEach(task => {
                createTaskElement(task.text, task.dueDate, task.createdAt, task.completed);
            });
        }
    }

    addBtn.addEventListener('click', addTask);
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') addTask(); });
</script>

</body>
</html>
